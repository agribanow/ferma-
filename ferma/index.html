<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ферма Свинок — цифри та лічба</title>
<style>
:root{
  --sky1:#aee3f7; --sky2:#e8f9ff;
  --grass1:#8fd05e; --grass2:#6db544;
  --ink:#3a2b20;
  --card:#fffdf5;
  --accent:#e8552f;
  --gold:#ffc233;
  --blue:#3d7fd9;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{
  font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(var(--sky1) 0%, var(--sky2) 55%, var(--grass1) 55%, var(--grass2) 100%);
  color:var(--ink);
  touch-action:manipulation;
}
#app{position:relative;width:100%;height:100%;overflow:hidden;}

/* ---------- декор ---------- */
.cloud{position:absolute;background:#fff;border-radius:50px;opacity:.9;filter:blur(.5px);animation:drift linear infinite;}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%;}
.cloud::before{width:55%;height:160%;left:15%;top:-70%;}
.cloud::after{width:40%;height:120%;right:12%;top:-45%;}
@keyframes drift{from{transform:translateX(-220px)}to{transform:translateX(110vw)}}
.flower{position:absolute;font-size:26px;bottom:6px;animation:sway 3.4s ease-in-out infinite;transform-origin:bottom center;}
@keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}

/* ---------- шапка ---------- */
#topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;padding:10px 14px;z-index:50;}
#btnHome{display:none;}
.pill{background:var(--card);border:3px solid var(--ink);border-radius:999px;padding:8px 16px;font-weight:800;font-size:20px;box-shadow:0 4px 0 rgba(58,43,32,.25);cursor:pointer;}
.pill:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(58,43,32,.25);}
#stars{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:24px;}
#starCount{font-size:26px;font-weight:900;}
#langBtn{min-width:74px;text-align:center;}

/* ---------- сцени ---------- */
.scene{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;}
.scene.active{display:flex;}

/* ---------- меню ---------- */
#menu h1{margin:60px 0 6px;font-size:min(6.5vw,44px);color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.2), 0 0 12px rgba(255,255,255,.4);letter-spacing:1px;}
#menu .sub{color:#2c5e18;font-weight:700;margin-bottom:14px;font-size:18px;}
#menuGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;width:min(94vw,980px);padding:0 10px;}
@media (max-aspect-ratio: 1/1){ #menuGrid{grid-template-columns:repeat(2,1fr);} }
.mcard{background:var(--card);border:4px solid var(--ink);border-radius:24px;padding:14px 8px 12px;text-align:center;cursor:pointer;box-shadow:0 6px 0 rgba(58,43,32,.28);transition:transform .12s;position:relative;}
.mcard:active{transform:scale(.96) translateY(4px);box-shadow:0 2px 0 rgba(58,43,32,.28);}
.mcard img{height:min(20vh,150px);animation:bob 2.6s ease-in-out infinite;}
.mcard:nth-child(2) img{animation-delay:.4s}.mcard:nth-child(3) img{animation-delay:.8s}.mcard:nth-child(4) img{animation-delay:1.2s}
@keyframes bob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.02)}}
.mcard .t{font-size:22px;font-weight:900;margin-top:4px;}
.mcard .d{font-size:15px;font-weight:700;color:#7a6a58;}
.mstars{position:absolute;top:8px;right:12px;font-size:15px;font-weight:900;color:#b8860b;}

/* ---------- ігрове поле ---------- */
.stage{position:relative;width:100%;flex:1;display:flex;flex-direction:column;align-items:center;}
.prompt{margin-top:62px;background:var(--card);border:4px solid var(--ink);border-radius:22px;padding:10px 22px;font-size:min(5vw,30px);font-weight:900;max-width:92vw;text-align:center;box-shadow:0 5px 0 rgba(58,43,32,.25);z-index:5;cursor:pointer;}
.prompt .num{color:var(--accent);font-size:1.25em;}
.mascot{position:absolute;bottom:2vh;height:min(30vh,240px);z-index:4;transition:transform .3s;pointer-events:none;}
.mascot.left{left:2vw;}
.mascot.right{right:2vw;}
.mascot.jump{animation:mjump .6s ease;}
@keyframes mjump{0%,100%{transform:translateY(0)}40%{transform:translateY(-40px) rotate(-4deg)}}

.playfield{position:relative;flex:1;width:min(96vw,900px);z-index:3;}
.item{position:absolute;font-size:min(9vw,64px);cursor:pointer;transition:transform .15s;filter:drop-shadow(0 3px 2px rgba(0,0,0,.25));}
.item:active{transform:scale(1.2);}
.item.gone{pointer-events:none;}

#basket{position:absolute;font-size:min(14vw,100px);bottom:1vh;left:50%;transform:translateX(-50%);z-index:4;}
#basketCnt{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);background:var(--gold);border:3px solid var(--ink);border-radius:999px;min-width:44px;padding:2px 8px;font-size:24px;font-weight:900;text-align:center;}

.answers{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding:8px 10px calc(2vh + 10px);z-index:5;}
.ansBtn{background:var(--card);border:4px solid var(--ink);border-radius:20px;min-width:min(17vw,96px);padding:10px 6px;font-size:min(8vw,44px);font-weight:900;cursor:pointer;box-shadow:0 6px 0 rgba(58,43,32,.28);transition:transform .1s;}
.ansBtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(58,43,32,.28);}
.ansBtn.ok{background:#b7f39a;border-color:#2c7a12;animation:pulseOk .5s;}
.ansBtn.bad{animation:shake .45s;background:#ffd9d3;}
.ansBtn.seven{box-shadow:0 6px 0 rgba(58,43,32,.28), 0 0 18px 4px var(--gold);}
@keyframes pulseOk{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}

/* цифра, що летить */
.flyNum{position:absolute;font-size:60px;font-weight:900;color:var(--accent);z-index:60;pointer-events:none;text-shadow:0 2px 0 #fff;}

/* ---------- потяг ---------- */
#trainWrap{position:absolute;bottom:4vh;left:0;width:100%;height:min(22vh,170px);z-index:4;}
#rail{position:absolute;bottom:8px;left:0;width:100%;height:8px;background:repeating-linear-gradient(90deg,#8a5a2b 0 26px,#6d4520 26px 34px);border-radius:4px;}
#train{position:absolute;bottom:14px;left:0;display:flex;align-items:flex-end;transition:transform 1.2s cubic-bezier(.45,.05,.35,1);}
.loco{width:min(15vw,110px);height:min(13vw,95px);position:relative;}
.loco .cab{position:absolute;right:0;bottom:14px;width:60%;height:75%;background:#3d7fd9;border:3px solid var(--ink);border-radius:10px 10px 4px 4px;}
.loco .nose{position:absolute;left:0;bottom:14px;width:52%;height:42%;background:#e8552f;border:3px solid var(--ink);border-radius:10px;}
.loco .chim{position:absolute;left:10%;bottom:52%;width:16%;height:30%;background:#555;border:3px solid var(--ink);border-radius:4px;}
.wheel{position:absolute;bottom:-6px;width:26px;height:26px;background:#333;border:3px solid #111;border-radius:50%;animation:spin 1s linear infinite paused;}
.rolling .wheel{animation-play-state:running;}
@keyframes spin{to{transform:rotate(360deg)}}
.car{width:min(11vw,80px);height:min(9vw,66px);margin-left:10px;position:relative;background:var(--gold);border:3px solid var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:min(6vw,34px);font-weight:900;}
.car::before{content:'';position:absolute;left:-13px;top:50%;width:13px;height:6px;background:#555;}
.car.pop{animation:carPop .45s cubic-bezier(.3,1.6,.5,1);}
@keyframes carPop{from{transform:translateY(-90px) scale(.6);opacity:0}to{transform:none;opacity:1}}
.car.cnt{background:#b7f39a;}
.smoke{position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;opacity:.85;pointer-events:none;animation:puff 1.4s ease-out forwards;}
@keyframes puff{to{transform:translate(-30px,-70px) scale(2.4);opacity:0}}
#depot{position:absolute;top:0;right:2vw;display:flex;gap:10px;z-index:6;}
#depot .car{cursor:pointer;margin-left:0;}
#depot .car::before{display:none;}
#depot .car:active{transform:scale(1.12);}

/* ---------- конфеті ---------- */
.confetti{position:absolute;width:12px;height:12px;z-index:80;pointer-events:none;}

/* ---------- оверлей успіху ---------- */
#bigStar{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:90;pointer-events:none;font-size:120px;animation:starPop 1.1s ease forwards;}
@keyframes starPop{0%{transform:scale(.2);opacity:0}30%{transform:scale(1.4);opacity:1}60%{transform:scale(1)}100%{transform:scale(1);opacity:0}}

/* послідовність чисел (Тато) */
.seqItem{position:absolute;background:var(--card);border:4px solid var(--ink);border-radius:50%;width:min(14vw,84px);height:min(14vw,84px);display:flex;align-items:center;justify-content:center;font-size:min(7vw,38px);font-weight:900;cursor:pointer;box-shadow:0 5px 0 rgba(58,43,32,.25);}
.seqItem.done{background:#b7f39a;border-color:#2c7a12;pointer-events:none;transform:scale(.9);}
.seqItem.s7{background:#fff3c8;}
.seqItem.s7.done{background:var(--gold);box-shadow:0 0 22px 6px rgba(255,194,51,.8);}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important;transition-duration:.001s !important;}
}
</style>
</head>
<body>
<div id="app">
  <div id="clouds"></div>

  <div id="topbar">
    <button class="pill" id="btnHome" onclick="goHome()">🏠</button>
    <button class="pill" id="langBtn" onclick="toggleLang()">🇺🇦 УКР</button>
    <button class="pill" id="btnSay" onclick="repeatPrompt()">🔊</button>
    <div id="stars">⭐<span id="starCount">0</span></div>
  </div>

  <!-- МЕНЮ -->
  <div class="scene active" id="menu">
    <h1>🐷 ФЕРМА СВИНОК 🐷</h1>
    <div class="sub">Обери, з ким гратися!</div>
    <div id="menuGrid">
      <div class="mcard" onclick="startMode('mama')">
        <div class="mstars" id="ms_mama"></div>
        <img src="sprites/mama_idle.png" alt="Мама">
        <div class="t">МАМА</div><div class="d">Лічба і кошик</div>
      </div>
      <div class="mcard" onclick="startMode('tato')">
        <div class="mstars" id="ms_tato"></div>
        <img src="sprites/tato_idle.png" alt="Тато">
        <div class="t">ТАТО</div><div class="d">Цифри до 20</div>
      </div>
      <div class="mcard" onclick="startMode('george')">
        <div class="mstars" id="ms_george"></div>
        <img src="sprites/george_idle.png" alt="Джордж">
        <div class="t">ДЖОРДЖ</div><div class="d">Додавання</div>
      </div>
      <div class="mcard" onclick="startMode('peppa')">
        <div class="mstars" id="ms_peppa"></div>
        <img src="sprites/peppa_idle.png" alt="Пеппа">
        <div class="t">ПЕППА</div><div class="d">Віднімання</div>
      </div>
    </div>
  </div>

  <!-- МАМА: лічба -->
  <div class="scene" id="sc_mama">
    <div class="prompt" id="pr_mama" onclick="repeatPrompt()"></div>
    <div class="stage">
      <img class="mascot left" id="m_mama" src="sprites/mama_idle.png" alt="">
      <div class="playfield" id="pf_mama"></div>
      <div id="basket">🧺<div id="basketCnt">0</div></div>
    </div>
  </div>

  <!-- ТАТО: цифри -->
  <div class="scene" id="sc_tato">
    <div class="prompt" id="pr_tato" onclick="repeatPrompt()"></div>
    <div class="stage">
      <img class="mascot left" id="m_tato" src="sprites/tato_idle.png" alt="">
      <div class="playfield" id="pf_tato"></div>
    </div>
    <div class="answers" id="an_tato"></div>
  </div>

  <!-- ДЖОРДЖ: додавання -->
  <div class="scene" id="sc_george">
    <div class="prompt" id="pr_george" onclick="repeatPrompt()"></div>
    <div class="stage">
      <img class="mascot right" id="m_george" src="sprites/george_idle.png" alt="">
      <div class="playfield">
        <div id="depot"></div>
        <div id="trainWrap">
          <div id="rail"></div>
          <div id="train"></div>
        </div>
      </div>
    </div>
    <div class="answers" id="an_george"></div>
  </div>

  <!-- ПЕППА: віднімання -->
  <div class="scene" id="sc_peppa">
    <div class="prompt" id="pr_peppa" onclick="repeatPrompt()"></div>
    <div class="stage">
      <img class="mascot left" id="m_peppa" src="sprites/peppa_idle.png" alt="">
      <div class="playfield" id="pf_peppa"></div>
    </div>
    <div class="answers" id="an_peppa"></div>
  </div>

  <div id="bigStar">⭐</div>
</div>

<script>
'use strict';
/* =================== СТАН =================== */
const LS_KEY='ferma_svynok_v1';
let S = load();
function load(){
  try{ return Object.assign({stars:0, lang:'uk', modeStars:{mama:0,tato:0,george:0,peppa:0}, round:{mama:0,tato:0,george:0,peppa:0}}, JSON.parse(localStorage.getItem(LS_KEY)||'{}')); }
  catch(e){ return {stars:0, lang:'uk', modeStars:{mama:0,tato:0,george:0,peppa:0}, round:{mama:0,tato:0,george:0,peppa:0}}; }
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(S)); }

let mode=null, busy=false, lastPrompt=null;

/* =================== ЧИСЛА СЛОВАМИ =================== */
const UK = ['нуль','один','два','три','чотири',"п'ять",'шість','сім','вісім',"дев'ять",'десять',
 'одинадцять','дванадцять','тринадцять','чотирнадцять',"п'ятнадцять",'шістнадцять','сімнадцять','вісімнадцять',"дев'ятнадцять",'двадцять'];
const UKf = ['нуль','одна','дві','три','чотири',"п'ять",'шість','сім','вісім',"дев'ять",'десять'];
const EN = ['zero','one','two','three','four','five','six','seven','eight','nine','ten',
 'eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty'];
function numWord(n, fem){ return S.lang==='en' ? EN[n] : (fem? (UKf[n]||UK[n]) : UK[n]); }

/* =================== ОЗВУЧКА =================== */
let voices=[], voiceUk=null, voiceEn=null;
function pickVoices(){
  voices = speechSynthesis.getVoices();
  voiceUk = voices.find(v=>/uk/i.test(v.lang)) || voices.find(v=>/ru/i.test(v.lang)) || null;
  voiceEn = voices.find(v=>/^en/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){ pickVoices(); speechSynthesis.onvoiceschanged = pickVoices; }

function say(text, opts={}){
  return new Promise(res=>{
    if(!('speechSynthesis' in window)){ res(); return; }
    const u = new SpeechSynthesisUtterance(text);
    const en = opts.lang==='en' || (S.lang==='en' && opts.lang!=='uk');
    u.lang = en ? 'en-US' : 'uk-UA';
    const v = en ? voiceEn : voiceUk;
    if(v) u.voice = v;
    u.rate = opts.rate || 0.95;
    u.pitch = opts.pitch || 1.15;
    u.onend = ()=>res(); u.onerror = ()=>res();
    if(opts.interrupt !== false) speechSynthesis.cancel();
    speechSynthesis.speak(u);
    setTimeout(res, Math.max(2200, text.length*160)); // страховка, якщо onend не спрацює
  });
}
function repeatPrompt(){ if(lastPrompt) say(lastPrompt.t, lastPrompt.o||{}); }
function setPrompt(el, html, speech, opts){
  el.innerHTML = html;
  lastPrompt = {t:speech, o:opts};
  say(speech, opts);
}

/* =================== ЗВУКИ (Web Audio) =================== */
let AC=null;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; }
function tone(f, t=0.12, type='sine', vol=0.25, when=0){
  try{
    const c=ac(), o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(vol, c.currentTime+when);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+when+t);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime+when); o.stop(c.currentTime+when+t+0.02);
  }catch(e){}
}
const sPlop = ()=>{ tone(300,0.08,'sine',0.3); tone(150,0.12,'sine',0.25,0.05); };
const sClick = ()=>tone(520,0.06,'triangle',0.2);
const sGood = ()=>{ [523,659,784,1047].forEach((f,i)=>tone(f,0.15,'triangle',0.22,i*0.09)); };
const sBad  = ()=>{ tone(220,0.2,'sawtooth',0.12); tone(180,0.25,'sawtooth',0.1,0.12); };
const sWhistle = ()=>{ tone(880,0.25,'square',0.08); tone(880,0.25,'square',0.08,0.35); };

/* =================== УТИЛІТИ =================== */
const rnd = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const shuffle = a=>{ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; };
const $ = id=>document.getElementById(id);
const sleep = ms=>new Promise(r=>setTimeout(r,ms));

function updateHUD(){
  $('starCount').textContent = S.stars;
  $('langBtn').textContent = S.lang==='uk' ? '🇺🇦 УКР' : '🇬🇧 ENG';
  for(const m of ['mama','tato','george','peppa']) $('ms_'+m).textContent = S.modeStars[m] ? '⭐'+S.modeStars[m] : '';
}
function toggleLang(){
  S.lang = S.lang==='uk' ? 'en' : 'uk'; save(); updateHUD(); sClick();
  say(S.lang==='uk' ? 'Рахуємо українською!' : 'Now we count in English!', {lang:S.lang});
}

function confettiBurst(x, y, n=26){
  const cols=['#e8552f','#ffc233','#3d7fd9','#8fd05e','#e969b4','#9b6ee8'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div'); d.className='confetti';
    d.style.left=x+'px'; d.style.top=y+'px';
    d.style.background=cols[i%cols.length];
    d.style.borderRadius = Math.random()<.5?'50%':'2px';
    document.getElementById('app').appendChild(d);
    const ang=Math.random()*Math.PI*2, sp=140+Math.random()*260;
    const vx=Math.cos(ang)*sp, vy=Math.sin(ang)*sp-180;
    d.animate([
      {transform:'translate(0,0) rotate(0)', opacity:1},
      {transform:`translate(${vx}px,${vy+380}px) rotate(${rnd(180,720)}deg)`, opacity:0}
    ],{duration:1100+Math.random()*500, easing:'cubic-bezier(.2,.6,.4,1)'}).onfinish=()=>d.remove();
  }
}
function mascotJump(id, happySrc, idleSrc){
  const m=$(id); m.src=happySrc; m.classList.add('jump');
  setTimeout(()=>{ m.classList.remove('jump'); m.src=idleSrc; }, 1600);
}
async function bigReward(modeName){
  const bs=$('bigStar'); bs.style.display='flex';
  bs.style.animation='none'; void bs.offsetWidth; bs.style.animation='';
  S.stars++; S.modeStars[modeName]++; save(); updateHUD();
  confettiBurst(innerWidth/2, innerHeight/2, 40);
  sGood();
  setTimeout(()=>bs.style.display='none', 1100);
}
/* політ елемента по дузі в ціль */
function flyTo(el, tx, ty, dur=700){
  return new Promise(res=>{
    const r=el.getBoundingClientRect();
    const sx=r.left, sy=r.top;
    const cx=(sx+tx)/2, cy=Math.min(sy,ty)-160;
    const t0=performance.now();
    el.style.position='fixed'; el.style.left=sx+'px'; el.style.top=sy+'px'; el.style.zIndex=70; el.style.margin=0;
    document.body.appendChild(el);
    function step(t){
      let k=(t-t0)/dur; if(k>1)k=1;
      const x=(1-k)*(1-k)*sx + 2*(1-k)*k*cx + k*k*tx;
      const y=(1-k)*(1-k)*sy + 2*(1-k)*k*cy + k*k*ty;
      el.style.left=x+'px'; el.style.top=y+'px';
      el.style.transform=`rotate(${k*360}deg) scale(${1-0.35*k})`;
      if(k<1) requestAnimationFrame(step); else { el.remove(); res(); }
    }
    requestAnimationFrame(step);
  });
}

/* =================== НАВІГАЦІЯ =================== */
function show(id){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
  $('btnHome').style.display = id==='menu' ? 'none' : 'block';
}
function goHome(){ speechSynthesis.cancel(); busy=false; mode=null; show('menu'); sClick(); }
function startMode(m){
  ac(); mode=m; sClick(); show('sc_'+m);
  ({mama:roundMama, tato:roundTato, george:roundGeorge, peppa:roundPeppa})[m]();
}

/* =================== РЕЖИМ МАМА: ЛІЧБА =================== */
const VEG=[{e:'🥕',uk:['морквину','морквини','морквин'],en:'carrot',f:1},
           {e:'🍎',uk:['яблуко','яблука','яблук'],en:'apple',f:0},
           {e:'🎃',uk:['гарбуз','гарбузи','гарбузів'],en:'pumpkin',f:0},
           {e:'🍐',uk:['грушу','груші','груш'],en:'pear',f:1},
           {e:'🍅',uk:['помідор','помідори','помідорів'],en:'tomato',f:0}];
function plural(n, forms){ // укр. форми: 1 / 2-4 / 5+
  const m10=n%10, m100=n%100;
  if(m10===1 && m100!==11) return forms[0];
  if(m10>=2 && m10<=4 && (m100<12||m100>14)) return forms[1];
  return forms[2];
}
let mamaState=null;
async function roundMama(){
  if(mode!=='mama') return;
  busy=false;
  const pf=$('pf_mama'); pf.innerHTML='';
  $('basketCnt').textContent='0';
  const lvl = Math.min(3, Math.floor(S.round.mama/4)+1);
  const target = lvl===1 ? rnd(3,5) : lvl===2 ? rnd(4,8) : rnd(6,10);
  // 7 з'являється частіше — тренуємо!
  const t = (Math.random()<0.3 && lvl>1) ? 7 : target;
  const veg = VEG[rnd(0,VEG.length-1)];
  const total = t + rnd(2,4);
  mamaState={need:t, got:0, veg};
  for(let i=0;i<total;i++){
    const d=document.createElement('div'); d.className='item'; d.textContent=veg.e;
    d.style.left = rnd(4,86)+'%';
    d.style.top  = rnd(8,62)+'%';
    d.style.animation = `sway ${2.5+Math.random()*2}s ease-in-out infinite`;
    d.onclick = ()=>pickVeg(d);
    pf.appendChild(d);
  }
  const speech = S.lang==='en'
    ? `Put ${EN[t]} ${veg.en}${t>1?'s':''} in the basket!`
    : `Поклади в кошик ${numWord(t, veg.f)} ${plural(t, veg.uk)}!`;
  setPrompt($('pr_mama'), `Поклади в кошик <span class="num">${t}</span> ${plural(t,veg.uk)} ${veg.e}`, speech);
}
async function pickVeg(d){
  if(busy || d.classList.contains('gone')) return;
  const st=mamaState;
  if(st.got >= st.need) return;
  d.classList.add('gone'); sPlop();
  st.got++;
  const b=$('basket').getBoundingClientRect();
  flyTo(d, b.left+b.width/2-20, b.top+10, 650);
  $('basketCnt').textContent = st.got;
  const n = st.got;
  // озвучуємо кожен предмет; СІМ — повільніше і з натиском
  const w = numWord(n, st.veg.f);
  await say(n===7 && S.lang==='uk' ? 'сі-і-ім!' : w, {rate: n===7?0.7:1.0, pitch: n===7?1.3:1.15});
  if(st.got===st.need){
    busy=true;
    await sleep(300);
    mascotJump('m_mama','sprites/mama_happy.png','sprites/mama_idle.png');
    confettiBurst(innerWidth/2, innerHeight*0.4);
    sGood();
    await say(S.lang==='en' ? `Great! Exactly ${EN[st.need]}!` : `Молодець! Рівно ${numWord(st.need, st.veg.f)}!`);
    S.round.mama++; save();
    if(S.round.mama % 4 === 0) await bigReward('mama');
    await sleep(600);
    roundMama();
  }
}

/* =================== РЕЖИМ ТАТО: ЦИФРИ ДО 20 =================== */
async function roundTato(){
  if(mode!=='tato') return;
  busy=false;
  const pf=$('pf_tato'); pf.innerHTML=''; $('an_tato').innerHTML='';
  // чергуємо: впізнавання числа / пропущене число в ряду (часто 7!)
  if(S.round.tato % 3 === 2) return seqTato();
  const lvl = Math.min(3, Math.floor(S.round.tato/5)+1);
  const max = lvl===1?10 : lvl===2?15 : 20;
  let target = rnd(1,max);
  if(Math.random()<0.25) target = Math.random()<.6 ? 7 : 17; // тренуємо сім/сімнадцять
  const opts = new Set([target]);
  while(opts.size < Math.min(4, max)) {
    let c = rnd(1,max);
    if(Math.abs(c-target)<=3 || Math.random()<.3) opts.add(c);
  }
  const speech = S.lang==='en' ? `Find the number ${EN[target]}!` : `Знайди число ${UK[target]}!`;
  setPrompt($('pr_tato'), `Знайди число: <span class="num">?</span>`, speech);
  const an=$('an_tato');
  shuffle([...opts]).forEach(n=>{
    const b=document.createElement('button'); b.className='ansBtn'+(n===7?' seven':''); b.textContent=n;
    b.onclick=async ()=>{
      if(busy) return;
      if(n===target){
        busy=true; b.classList.add('ok'); sGood();
        confettiBurst(b.getBoundingClientRect().left+40, b.getBoundingClientRect().top);
        mascotJump('m_tato','sprites/tato_happy.png','sprites/tato_idle.png');
        await say(S.lang==='en' ? `Yes! ${EN[n]}!` : `Так! Це ${UK[n]}!`);
        S.round.tato++; save();
        if(S.round.tato % 5 === 0) await bigReward('tato');
        await sleep(500); roundTato();
      } else {
        b.classList.add('bad'); sBad();
        await say(S.lang==='en' ? `That is ${EN[n]}. Try again!` : `Це ${UK[n]}. Спробуй ще!`);
        setTimeout(()=>b.classList.remove('bad'),500);
      }
    };
    an.appendChild(b);
  });
}
/* ряд чисел із пропуском — тренажер «шістка-СІМКА-вісімка» */
async function seqTato(){
  const pf=$('pf_tato'); pf.innerHTML=''; $('an_tato').innerHTML='';
  const missSeven = Math.random()<0.55;
  const start = missSeven ? rnd(5,6) : rnd(1,7);
  const miss = missSeven ? 7 : start + rnd(1,2);
  const seq=[start,start+1,start+2,start+3];
  const speech = S.lang==='en' ? 'Which number is missing?' : 'Яке число заховалося? Порахуй уголос!';
  setPrompt($('pr_tato'), seq.map(n=>n===miss?'<span class="num">❓</span>':n).join(' &nbsp; '), speech);
  const an=$('an_tato');
  const opts = shuffle([miss, miss-1===0?miss+2:miss-1, miss+1]);
  opts.forEach(n=>{
    const b=document.createElement('button'); b.className='ansBtn'+(n===7?' seven':''); b.textContent=n;
    b.onclick=async ()=>{
      if(busy) return;
      if(n===miss){
        busy=true; b.classList.add('ok'); sGood();
        mascotJump('m_tato','sprites/tato_happy.png','sprites/tato_idle.png');
        confettiBurst(innerWidth/2, innerHeight*0.4);
        // проговорюємо весь ряд, «сім» — із зіркою
        for(const k of seq){ await say(k===7&&S.lang==='uk' ? 'СІМ!' : numWord(k), {rate:k===7?0.7:1.05, interrupt:false}); }
        S.round.tato++; save();
        if(S.round.tato % 5 === 0) await bigReward('tato');
        await sleep(400); roundTato();
      } else {
        b.classList.add('bad'); sBad();
        await say(S.lang==='en'?'Try again!':'Ще разок!');
        setTimeout(()=>b.classList.remove('bad'),500);
      }
    };
    an.appendChild(b);
  });
}

/* =================== РЕЖИМ ДЖОРДЖ: ДОДАВАННЯ =================== */
let geo=null;
function buildLoco(){
  const l=document.createElement('div'); l.className='loco';
  l.innerHTML='<div class="nose"></div><div class="cab"></div><div class="chim"></div>'+
              '<div class="wheel" style="left:8%"></div><div class="wheel" style="left:42%"></div><div class="wheel" style="right:6%"></div>';
  return l;
}
function makeCar(txt=''){ 
  const c=document.createElement('div'); c.className='car'; c.textContent=txt;
  c.innerHTML += '<div class="wheel" style="left:12%"></div><div class="wheel" style="right:12%"></div>';
  return c;
}
function puffSmoke(){
  const t=$('train'); if(!t.firstChild) return;
  const r=t.firstChild.getBoundingClientRect();
  const s=document.createElement('div'); s.className='smoke';
  s.style.left=(r.left + r.width*0.14)+'px'; s.style.top=(r.top-6)+'px';
  document.body.appendChild(s); setTimeout(()=>s.remove(),1400);
}
async function roundGeorge(){
  if(mode!=='george') return;
  busy=true;
  const lvl = Math.min(3, Math.floor(S.round.george/4)+1);
  const a = lvl===1?rnd(1,3):rnd(1,5), b = lvl===1?rnd(1,3):rnd(1,Math.min(5,10-a));
  geo={a,b,need:b,added:0,sum:a+b};
  const train=$('train'); train.innerHTML=''; train.style.transform='translateX(-110%)';
  train.appendChild(buildLoco());
  for(let i=0;i<a;i++) train.appendChild(makeCar());
  const depot=$('depot'); depot.innerHTML='';
  for(let i=0;i<b+rnd(1,2);i++){
    const c=makeCar(); c.onclick=()=>addCar(c); depot.appendChild(c);
  }
  $('an_george').innerHTML='';
  const speech = S.lang==='en'
    ? `The train has ${EN[a]} car${a>1?'s':''}. Add ${EN[b]} more!`
    : `У поїзді ${numWord(a,1)} ${plural(a,['вагончик','вагончики','вагончиків'])}. Причепи ще ${numWord(b,0)==='два'?'два':numWord(b)}!`;
  setPrompt($('pr_george'), `<span class="num">${a}</span> + <span class="num">${b}</span> = ?`, speech);
  sWhistle();
  train.classList.add('rolling');
  const smoker=setInterval(puffSmoke, 350);
  await sleep(100); train.style.transform='translateX(6vw)';
  await sleep(1300); train.classList.remove('rolling'); clearInterval(smoker);
  busy=false;
}
async function addCar(c){
  if(busy || geo.added>=geo.need) return;
  c.onclick=null; sClick();
  const train=$('train');
  const nc=makeCar(); nc.classList.add('pop');
  train.appendChild(nc); c.remove();
  geo.added++;
  tone(240,0.1,'square',0.25); // «клац» зчеплення
  await say(numWord(geo.a+geo.added,1), {rate:(geo.a+geo.added)===7?0.7:1.0});
  if(geo.added===geo.need){
    busy=true;
    await sleep(300);
    // рахуємо всі вагони по черзі з підсвіткою
    const cars=[...train.querySelectorAll('.car')];
    for(let i=0;i<cars.length;i++){
      cars[i].classList.add('cnt'); cars[i].textContent=(i+1); sClick();
      await say(numWord(i+1,1), {rate:(i+1)===7?0.7:1.05, interrupt:false});
    }
    // варіанти відповіді
    const an=$('an_george'); an.innerHTML='';
    const opts=shuffle([geo.sum, geo.sum+1, Math.max(1,geo.sum-1)]);
    await say(S.lang==='en'?'How many cars in total?':'Скільки всього вагончиків?');
    busy=false;
    opts.forEach(n=>{
      const bt=document.createElement('button'); bt.className='ansBtn'+(n===7?' seven':''); bt.textContent=n;
      bt.onclick=async ()=>{
        if(busy) return;
        if(n===geo.sum){
          busy=true; bt.classList.add('ok'); sGood(); sWhistle();
          mascotJump('m_george','sprites/george_happy.png','sprites/george_idle.png');
          confettiBurst(innerWidth/2, innerHeight*0.5);
          await say(S.lang==='en' ? `Right! ${EN[geo.a]} plus ${EN[geo.b]} is ${EN[geo.sum]}!`
                                  : `Правильно! ${UK[geo.a]} додати ${UK[geo.b]} буде ${UK[geo.sum]}!`);
          // поїзд їде геть
          const train=$('train');
          train.classList.add('rolling');
          const sm=setInterval(puffSmoke,300);
          train.style.transform='translateX(110vw)';
          await sleep(1300); clearInterval(sm); train.classList.remove('rolling');
          S.round.george++; save();
          if(S.round.george % 4===0) await bigReward('george');
          roundGeorge();
        } else {
          bt.classList.add('bad'); sBad();
          await say(S.lang==='en'?'Count again!':'Порахуй ще разок!');
          setTimeout(()=>bt.classList.remove('bad'),500);
        }
      };
      an.appendChild(bt);
    });
  }
}

/* =================== РЕЖИМ ПЕППА: ВІДНІМАННЯ =================== */
let pep=null;
async function roundPeppa(){
  if(mode!=='peppa') return;
  busy=true;
  const pf=$('pf_peppa'); pf.innerHTML=''; $('an_peppa').innerHTML='';
  const lvl = Math.min(3, Math.floor(S.round.peppa/4)+1);
  const a = lvl===1?rnd(3,5):rnd(4,10);
  const b = rnd(1, Math.min(lvl===1?2:4, a-1));
  pep={a,b,res:a-b,taken:0};
  const emo = ['🌼','🦋','🍓','🎈'][rnd(0,3)];
  const items=[];
  for(let i=0;i<a;i++){
    const d=document.createElement('div'); d.className='item'; d.textContent=emo;
    d.style.left=(8+ (i%5)*18 + rnd(-2,2))+'%';
    d.style.top =(15+ Math.floor(i/5)*30 + rnd(-3,3))+'%';
    pf.appendChild(d); items.push(d);
  }
  const nameF = {'🌼':['квіточку','квіточки','квіточок'],'🦋':['метелика','метелики','метеликів'],'🍓':['полуничку','полунички','полуничок'],'🎈':['кульку','кульки','кульок']}[emo];
  const speech = S.lang==='en'
    ? `There are ${EN[a]}. Take away ${EN[b]}. Tap ${EN[b]} of them!`
    : `Ось ${numWord(a,1)} ${plural(a,nameF)}. Забери ${numWord(b,1)}! Торкнись ${plural(b,nameF)}.`;
  setPrompt($('pr_peppa'), `<span class="num">${a}</span> − <span class="num">${b}</span> = ?`, speech);
  busy=false;
  items.forEach(d=>{
    d.onclick=async ()=>{
      if(busy||d.classList.contains('gone')||pep.taken>=pep.b) return;
      d.classList.add('gone'); pep.taken++; sPlop();
      d.animate([{transform:'scale(1)',opacity:1},{transform:'translateY(-140px) scale(.4) rotate(30deg)',opacity:0}],{duration:700,easing:'ease-in'}).onfinish=()=>d.style.visibility='hidden';
      await say(numWord(pep.taken,1),{rate:pep.taken===7?0.7:1.0});
      if(pep.taken===pep.b) askPeppa();
    };
  });
}
async function askPeppa(){
  busy=true;
  await say(S.lang==='en'?'How many are left?':'Скільки залишилось? Порахуй!');
  const an=$('an_peppa');
  const opts=shuffle([pep.res, pep.res+1, Math.max(0,pep.res-1)].filter((v,i,arr)=>arr.indexOf(v)===i));
  busy=false;
  opts.forEach(n=>{
    const b=document.createElement('button'); b.className='ansBtn'+(n===7?' seven':''); b.textContent=n;
    b.onclick=async ()=>{
      if(busy) return;
      if(n===pep.res){
        busy=true; b.classList.add('ok'); sGood();
        mascotJump('m_peppa','sprites/peppa_happy.png','sprites/peppa_idle.png');
        confettiBurst(innerWidth/2, innerHeight*0.4);
        await say(S.lang==='en' ? `Yes! ${EN[pep.a]} minus ${EN[pep.b]} is ${EN[pep.res]}!`
                                : `Так! ${UK[pep.a]} відняти ${UK[pep.b]} буде ${UK[pep.res]}!`);
        S.round.peppa++; save();
        if(S.round.peppa % 4===0) await bigReward('peppa');
        await sleep(500); roundPeppa();
      } else {
        b.classList.add('bad'); sBad();
        await say(S.lang==='en'?'Count once more!':'Порахуй ще раз!');
        setTimeout(()=>b.classList.remove('bad'),500);
      }
    };
    an.appendChild(b);
  });
}
